name: Build & Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x64
            target: linux
          - os: windows-latest
            arch: x64
            target: win
          - os: macos-latest
            arch: x64
            target: mac
          - os: macos-latest
            arch: arm64
            target: mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build & Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: |
          if [ "${{ matrix.target }}" = "linux" ]; then
            npx electron-builder --linux --x64 --publish always
          elif [ "${{ matrix.target }}" = "win" ]; then
            npx electron-builder --win --x64 --publish always
          elif [ "${{ matrix.target }}" = "mac" ]; then
            if [ "${{ matrix.arch }}" = "arm64" ]; then
              npx electron-builder --mac --arm64 --publish always
            else
              npx electron-builder --mac --x64 --publish always
            fi
          fi
        shell: bash

